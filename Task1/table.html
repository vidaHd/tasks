<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task 1 - Sortable Employee Table</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="wrap">
      <h1>Employee Parking Overview</h1>
      <p class="subtitle">
        Improve the styling and add sorting behavior for selected columns.
      </p>
      
      <div class="table-shell">
        <table class="employee-table" id="employeeTable">
          
          <!-- specify columns widths -->
          <colgroup>
            <col style="width: 28%" />
            <col style="width: 22%" />
            <col style="width: 28%" />
            <col style="width: 12%" />
            <col style="width: 10%" />
          </colgroup>

          <thead>
            <tr>
              <th data-key="name" data-type="string" data-sortable="true">Name</th>
              <th data-key="department" data-type="string" data-sortable="true">Department</th>
              <th data-key="role" data-type="string">Role</th>
              <th data-key="startDate" data-type="date" data-sortable="true">Start Date</th>
              <th data-key="monthlyFee" data-type="number" data-sortable="true">Monthly Fee</th>
            </tr>
          </thead>
          <tbody id="employeeTableBody"></tbody>
        </table>
      </div>
    </main>

    <script src="./table.js"></script>
  </body>
</html>
